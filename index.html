
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Live Beehive Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg: #0b0f19;
  --card: #131a2a;
  --accent: #ef4444;
  --accent-soft: rgba(239,68,68,.6);
  --text: #e5e7eb;
  --muted: #9ca3af;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #1e293b, var(--bg));
  font-family: system-ui, sans-serif;
  color: var(--text);
}

.card {
  background: var(--card);
  width: 100%;
  max-width: 460px;
  padding: 2rem;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  text-align: center;
}

.logo {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  margin-bottom: .75rem;
}

h1 { margin: 0; font-size: 1.4rem; }

.live {
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  margin: .75rem 0 1.2rem 0;
  font-weight: 600;
  color: var(--accent);
}

.pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 0 var(--accent-soft);
  animation: pulse 1.4s infinite;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 var(--accent-soft); }
  70%  { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

.controls {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin: 1.2rem 0;
}

button {
  padding: .7rem 1.6rem;
  border-radius: 999px;
  border: none;
  background: #2563eb;
  color: white;
  font-size: 1rem;
  cursor: pointer;
}

button:disabled { background: #334155; }

.stats {
  display: flex;
  justify-content: space-between;
  font-size: .85rem;
  color: var(--muted);
  margin-bottom: .5rem;
}

.meter {
  height: 10px;
  background: #020617;
  border-radius: 6px;
  overflow: hidden;
}

.meter > div {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#22c55e,#eab308,#ef4444);
  transition: width .1s linear;
}

.fallback {
  display: none;
  margin-top: 1rem;
  color: #fca5a5;
  font-size: .9rem;
}
</style>
</head>
<body>

<div class="card">
  <h1>Live Beehive Sound</h1>

  <div id="live" class="live" style="display:none">
    <div class="pulse"></div> LIVE
  </div>

  <div class="controls">
    <button id="play">▶ Play</button>
    <button id="stop" disabled>■ Stop</button>
  </div>

  <div class="stats">
    <div>Time: <span id="time">00:00</span></div>
    <div>Latency: <span id="latency">–</span></div>
  </div>

  <div class="meter"><div id="level"></div></div>
  <div id="fallback" class="fallback">Stream offline</div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
const STREAM_URL = "http://192.168.1.50:8000/mic.mp3";

const audio = document.getElementById('audio');
audio.src = STREAM_URL;

const playBtn = document.getElementById('play');
const stopBtn = document.getElementById('stop');
const liveEl  = document.getElementById('live');
const timeEl  = document.getElementById('time');
const latEl   = document.getElementById('latency');
const fallback = document.getElementById('fallback');
const levelEl = document.getElementById('level');

let startTime, timer;

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const src = ctx.createMediaElementSource(audio);
const analyser = ctx.createAnalyser();
analyser.fftSize = 256;
src.connect(analyser);
analyser.connect(ctx.destination);
const data = new Uint8Array(analyser.frequencyBinCount);

function meter() {
  analyser.getByteFrequencyData(data);
  const avg = data.reduce((a,b)=>a+b)/data.length;
  levelEl.style.width = Math.min(100, avg*1.1) + "%";
  requestAnimationFrame(meter);
}

function formatTime(sec){
  const m = String(Math.floor(sec/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return m+":"+s;
}

playBtn.onclick = async () => {
  try{
    await ctx.resume();
    await audio.play();
    meter();

    startTime = Date.now();
    timer = setInterval(()=>{
      const sec = Math.floor((Date.now()-startTime)/1000);
      timeEl.textContent = formatTime(sec);
    },1000);

    liveEl.style.display = 'inline-flex';
    playBtn.disabled = true;
    stopBtn.disabled = false;
    fallback.style.display = 'none';

    setTimeout(()=>{
      if(audio.buffered.length){
        const d = audio.buffered.end(0)-audio.currentTime;
        latEl.textContent = d.toFixed(1)+" s";
      }
    },4000);
  } catch {
    fallback.style.display = 'block';
  }
};

stopBtn.onclick = ()=>{
  audio.pause();
  audio.currentTime = 0;
  clearInterval(timer);
  levelEl.style.width = '0%';
  timeEl.textContent = '00:00';
  liveEl.style.display = 'none';
  playBtn.disabled = false;
  stopBtn.disabled = true;
};

audio.onerror = ()=>{
  fallback.style.display = 'block';
  liveEl.style.display = 'none';
};
</script>

</body>
</html>

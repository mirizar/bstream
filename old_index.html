<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Live audio beehive stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      padding: 2rem;
      text-align: center;
    }
    .player {
      background: white;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,.1);
      max-width: 400px;
      margin: auto;
    }
  </style>
</head>
<body>

  <div class="player">
    <h1>🎙️ Live stream</h1>
    <p>Live audio via Icecast</p>

    <audio controls autoplay>
      http://192.168.1.50:8000/mic.mp3
      Je browser ondersteunt geen audio.
    </audio>

    <p style="font-size:0.9rem;color:#666;">
      Verbindingsstatus afhankelijk van de stream
    </p>
  </div>

</body>
</html>
